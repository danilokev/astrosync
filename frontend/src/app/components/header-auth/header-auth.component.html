<header class="auth-header">
  <a
    (click)="goToApp()"
    class="auth-back-btn"
    role="button"
    aria-label="Volver al Planetario"
    tabindex="0"
  >
    <span class="back-icon" aria-hidden="true">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </span>
    <span class="back-text">Volver al Planetario</span>
  </a>

  <a routerLink="/" class="auth-brand" aria-label="Ir a Astrosync" tabindex="0">
    <span class="brand-text">Astrosync</span>
  </a>
</header>
