<div
  class="photo-gallery__panel"
  [class.show]="isOpen"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="panelTitle"
>
  <!-- Modal de carga de fotos -->
  <app-photo-upload-modal
    [isOpen]="isUploadModalOpen"
    (closeModal)="handleCloseUploadModal()"
    (uploadSuccess)="handleUploadSuccess()"
  ></app-photo-upload-modal>

  <!-- Modal de eliminación de foto -->
  <app-photo-delete-modal
    [isOpen]="isDeleteModalOpen"
    [photoTitle]="photoToDeleteTitle"
    [isDeleting]="isDeletingPhoto"
    (confirm)="handleConfirmDelete()"
    (cancel)="handleCancelDelete()"
  ></app-photo-delete-modal>

  <!-- Modal de edición de foto -->
  <app-photo-edit-modal
    [isOpen]="isEditModalOpen"
    [photoId]="photoToEditId"
    (closeModal)="handleCloseEditModal()"
  ></app-photo-edit-modal>

  <!-- Panel de detalle de foto -->
  <app-photo-detail
    [isOpen]="isDetailPanelOpen"
    [photoId]="photoToViewId"
    (closePanel)="handleCloseDetailPanel()"
  ></app-photo-detail>

  <!-- Header -->
  <header class="photo-gallery__header">
    <div class="photo-gallery__header-left">
      <h2 class="photo-gallery__title">{{ panelTitle }}</h2>
      <span class="photo-gallery__count" *ngIf="photos.length > 0"
        >{{ photos.length }} foto{{ photos.length !== 1 ? "s" : "" }}
      </span>
    </div>

    <div class="photo-gallery__header-actions">
      <button
        type="button"
        class="btn btn-add-photo"
        (click)="handleAddPhoto()"
        [disabled]="isLoadingPhotos"
        aria-label="Añadir nueva fotografía"
      >
        <i class="bi bi-plus-lg"></i>
        <span>Añadir foto</span>
      </button>

      <button
        type="button"
        class="btn-close-panel"
        title="Cerrar panel de galería"
        aria-label="Cerrar panel"
        (click)="handleClosePanel()"
      >
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
  </header>

  <div class="photo-gallery__content">
    <!-- Estado de carga -->
    <div *ngIf="isLoadingPhotos" class="photo-gallery__loading">
      <div class="loading-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
      </div>
      <p class="loading-text">Cargando galería...</p>
    </div>

    <!-- Grid de fotos -->
    <div class="photo-gallery__grid" *ngIf="!isLoadingPhotos">
      <ng-container *ngIf="photos.length > 0; else noPhotos">
        <app-photo-card
          *ngFor="let photo of photos; trackBy: trackByPhotoId"
          [imageUrl]="getUrlThumbnail(photo.thumbnail)"
          [photoName]="photo.titulo"
          [photoId]="photo._id"
          [photoDate]="formatDate(photo.fechaCreacion)"
          [location]="photo.localizacion?.nombre"
          (onDelete)="handleDeletePhoto($event)"
          (onEdit)="handleEditPhoto($event)"
          (onClick)="handleViewPhoto($event)"
        ></app-photo-card>
      </ng-container>

      <!-- Mensaje cuando no hay fotos -->
      <ng-template #noPhotos>
        <div class="photo-gallery__empty">
          <div class="empty-illustration">
            <div class="empty-icon-wrapper">
              <i class="bi bi-images"></i>
            </div>
          </div>
          <h3 class="empty-title">Tu galería está vacía</h3>
          <p class="empty-description">
            Añade tu primera fotografía para empezar a construir tu colección.
          </p>
          <button
            type="button"
            class="btn btn-add-photo-empty"
            (click)="handleAddPhoto()"
          >
            <i class="bi bi-plus-lg"></i>
            <span>Subir primera foto</span>
          </button>
        </div>
      </ng-template>
    </div>
  </div>
</div>
