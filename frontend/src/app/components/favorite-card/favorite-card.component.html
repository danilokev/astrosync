<div class="custom-card p-3 mb-3 d-flex flex-column gap-2">
  <div
    class="d-flex justify-content-between align-items-center align-items-start"
  >
    <div class="d-flex align-items-center gap-3">
      <div class="card-img-wrapper">
        <img *ngIf="imageUrl" [src]="imageUrl" [alt]="title" class="card-img" />
        <div *ngIf="!imageUrl" class="card-img-placeholder"></div>
      </div>

      <div>
        <h3 class="m-0 card-title">{{ title }}</h3>
        <span *ngIf="tipo" class="card-subtitle">
          <i class="bi {{ tipoIcon }}"></i> {{ tipoLabel }}
        </span>
      </div>
    </div>

    <div class="actions">
      <button
        class="action-btn location-btn"
        title="Ver localización del objeto"
        (click)="onLocation()"
      >
        <i class="bi bi-crosshair"></i>
      </button>

      <button
        class="action-btn delete-btn"
        title="Eliminar de favoritos"
        (click)="onDelete()"
      >
        <i class="bi bi-trash"></i>
      </button>
    </div>
  </div>
</div>
